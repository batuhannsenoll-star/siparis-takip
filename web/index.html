<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akış</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E2124">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Akış">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<style>
  :root{
    --shell:#1E2124;
    --shell-2:#2A2E33;
    --paper:#F3F1EC;
    --panel:#FFFFFF;
    --ink:#22262B;
    --muted:#6B7280;
    --line:#E3E0D8;
    --amber:#C9862C;
    --amber-dark:#A66A1E;
    --green:#4C7A52;
    --green-bg:#EAF1EA;
    --red:#B3452F;
    --red-bg:#F7EAE6;
    --wood-1:#C9862C;
    --wood-2:#8A5A2B;
    --wood-3:#D9B98A;
    --wood-4:#5B3A22;
    --wood-5:#E8D2A6;
    --radius:10px;
    --shadow:0 1px 2px rgba(20,20,20,.06), 0 4px 14px rgba(20,20,20,.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;}
  #app{min-height:100vh;}
  h1,h2,h3{font-family:'Space Grotesk',system-ui,sans-serif;margin:0;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  .veneer{display:none;}

  .gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--shell);gap:20px;padding:24px;}
  .gate-logo{color:var(--wood-3);letter-spacing:.06em;text-transform:uppercase;font-size:13px;font-weight:600;}
  .gate-title{color:#fff;font-size:32px;font-weight:700;text-align:center;}
  .gate-sub{color:#9aa0a6;font-size:14px;max-width:420px;text-align:center;line-height:1.5;margin-bottom:8px;}
  .powered-by{color:#5f6a68;font-size:11px;letter-spacing:.04em;margin-top:22px;text-transform:uppercase;}
  .app-footer{text-align:center;color:var(--muted);font-size:11px;letter-spacing:.03em;text-transform:uppercase;padding:18px 0 24px;}
  .auth-card{width:340px;background:var(--shell-2);border:1px solid #3a3f45;border-radius:var(--radius);padding:26px;color:#fff;}
  .auth-field{margin-bottom:12px;display:flex;flex-direction:column;gap:5px;}
  .auth-field label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#9aa0a6;}
  .auth-field input,.auth-field select{padding:10px 12px;border-radius:7px;border:1px solid #4a4f55;background:#1c1f22;color:#fff;font-size:14px;}
  .auth-field input:focus,.auth-field select:focus{outline:2px solid var(--amber);}
  .auth-submit{width:100%;padding:11px;border-radius:8px;border:none;background:var(--amber);color:#1c1f22;font-weight:700;font-size:14px;margin-top:6px;}
  .auth-submit:hover{background:#dd9a3b;}
  .auth-submit:disabled{opacity:.6;}
  .auth-error{color:#e08b74;font-size:12px;min-height:16px;margin-top:8px;}
  .auth-ok{color:#8fcf9b;font-size:12px;min-height:16px;margin-top:8px;line-height:1.4;}
  .auth-hint{font-size:11px;color:#7c828a;margin-top:2px;}

  header{background:var(--shell);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .brand{display:flex;flex-direction:row;align-items:center;gap:12px;}
  .brand-logo{width:36px;height:36px;border-radius:8px;}
  .brand .eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--wood-3);font-weight:600;}
  .brand h1{font-size:20px;}
  .role-chip{display:flex;align-items:center;gap:10px;}
  .role-badge{background:var(--shell-2);border:1px solid #3a3f45;color:#fff;padding:6px 12px;border-radius:20px;font-size:13px;display:flex;align-items:center;gap:6px;}
  .role-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);}
  .role-badge.uretim .dot{background:var(--green);}
  .switch-btn{background:transparent;border:1px solid #4a4f55;color:#c9ccd0;padding:6px 12px;border-radius:20px;font-size:13px;}
  .modul-switch{display:flex;background:var(--shell-2);border:1px solid #3a3f45;border-radius:20px;padding:3px;gap:2px;}
  .modul-btn{padding:6px 14px;border-radius:20px;font-size:13px;color:#9aa0a6;}
  .modul-btn.active{background:var(--amber);color:#1c1f22;font-weight:600;}
  .switch-btn:hover{border-color:#fff;color:#fff;}

  .tabs{display:flex;gap:4px;padding:0 24px;background:var(--shell-2);}
  .tab{padding:12px 16px;color:#b8bcc0;font-size:14px;font-weight:500;border-bottom:2px solid transparent;}
  .tab.active{color:#fff;border-bottom-color:var(--amber);}
  .tab:hover{color:#fff;}

  main{max-width:1180px;margin:0 auto;padding:24px;}

  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
  .stat .num{font-family:'Space Grotesk';font-size:26px;font-weight:700;}
  .stat .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-top:4px;}

  .filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
  .chip{padding:7px 14px;border-radius:20px;border:1px solid var(--line);background:var(--panel);font-size:13px;color:var(--muted);}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .search{margin-left:auto;padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;min-width:220px;background:var(--panel);}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{text-align:left;padding:10px 12px;background:#FAF9F6;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--line);white-space:nowrap;}
  tbody td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FAFAF8;}
  .status-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
  .status-pill.bekliyor{background:var(--red-bg);color:var(--red);}
  .status-pill.uretildi{background:var(--green-bg);color:var(--green);}
  .status-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
  .row-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:600;color:var(--ink);}
  .row-btn:hover{border-color:var(--ink);}
  .row-btn.primary{background:var(--amber);border-color:var(--amber-dark);color:#fff;}
  .row-btn.primary:hover{background:var(--amber-dark);}
  .row-btn.ghost{background:transparent;border:none;color:var(--muted);text-decoration:underline;padding:6px 4px;}
  .empty{padding:48px 24px;text-align:center;color:var(--muted);}
  .empty b{display:block;color:var(--ink);font-family:'Space Grotesk';font-size:16px;margin-bottom:6px;}

  .form-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;max-width:640px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field.full{grid-column:1/-1;}
  .field label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;}
  .field input,.field select,.field textarea{padding:9px 11px;border:1px solid var(--line);border-radius:7px;font-size:14px;background:#fff;color:var(--ink);}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--amber);outline-offset:1px;border-color:var(--amber);}
  .field .hint{font-size:11px;color:var(--muted);}
  .field.readout input{background:#FAF9F6;color:var(--muted);}
  .form-actions{display:flex;gap:10px;margin-top:18px;}
  .btn{padding:10px 18px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:14px;font-weight:600;}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
  .btn.primary:hover{background:#000;}
  .btn:hover{border-color:var(--ink);}
  .msg{font-size:13px;padding:10px 12px;border-radius:8px;margin-bottom:14px;}
  .msg.ok{background:var(--green-bg);color:var(--green);}
  .msg.err{background:var(--red-bg);color:var(--red);}

  .overlay{position:fixed;inset:0;background:rgba(20,20,20,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal{background:#fff;border-radius:var(--radius);max-width:520px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .modal-head h3{font-size:17px;}
  .modal-body{padding:20px 22px;}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}
  .close-x{background:none;border:none;font-size:20px;color:var(--muted);line-height:1;}
  .meta-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:4px 0;border-bottom:1px dashed var(--line);}
  .meta-row:last-child{border-bottom:none;}
  .loading{padding:60px;text-align:center;color:var(--muted);}
  .asama-node:hover rect{opacity:.85;}
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  // ---- Supabase bağlantısı ----
  const CONFIG = window.AKIS_CONFIG || {};
  const SUPABASE_URL = CONFIG.supabaseUrl;
  const SUPABASE_ANON_KEY = CONFIG.supabaseAnonKey;
  const FIRMA_ADI = CONFIG.firmaAdi || "Akış";
  const FIRMA_LOGO = CONFIG.firmaLogo || "";
  const AKTIF_MODULLER = CONFIG.aktifModuller || ["satis","uretim","tedarik"];
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const CINS_OPTIONS = ["Kavak/Kavak", "Kavak/Huş", "Kayın/Kayın"];
  const ASAMA_OPTIONS = ["Sırada", "Üretimde", "Ebatlamada", "Sevkiyatta"];
  const MAKINE_OPTIONS = ["Ç-K-P", "K-K-P"];
  const USTA_OPTIONS = {
    "Ç-K-P": ["Ahmet Tuncer", "Murat Türken", "Gökhan Pamuk"],
    "K-K-P": ["Batuhan Ataman", "Zafer Hasanoğlu", "Tahsin Doğru"]
  };

  let state = {
    user: null,
    profile: null,        // {id, ad_soyad, rol}
    profilesMap: {},
    authError: '',
    authOk: '',
    authBusy: false,
    modul: null,           // 'satis' | 'uretim'
    activeTab: 'liste',
    filterStatus: 'bekliyor',
    search: '',
    orders: [],
    hatKapasiteleri: {},
    gunlukUretim: [],
    gunlukUretimLoaded: false,
    tutkal: [],
    tutkalLoaded: false,
    tumKullanicilar: [],
    kantarGirisleri: [], kantarLoaded: false,
    soymaCiktisi: [], soymaLoaded: false,
    kontraplakReceteleri: {}, receteLoaded: false,
    sistemAyarlari: {}, ayarlarLoaded: false,
    envanterHareketleri: [], envanterLoaded: false,
    giyotinKesim: [], giyotinLoaded: false,
    disPapelHareketleri: [], disPapelLoaded: false,
    presUretim: [], presLoaded: false,
    cncIslem: [], cncLoaded: false,
    zimparaFitil: [], zimparaLoaded: false,
    cizimler: [], cizimlerLoaded: false, cizimYukleniyor: false, cizimSearch: '',
    ozetAy: new Date().toISOString().slice(0,7), // 'YYYY-MM'
    gunlukBaslangic: '', gunlukBitis: '',
    loading: true,
    modal: null,
    toast: null
  };

  const app = document.getElementById('app');

  function fmtDate(iso){ if(!iso) return '—'; const d = new Date(iso); if(isNaN(d)) return iso; return d.toLocaleDateString('tr-TR'); }
  function fmtDateTime(iso){ if(!iso) return '—'; const d = new Date(iso); if(isNaN(d)) return iso; return d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}); }
  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function calcM3(en,boy,kalinlik,adet){ const v = (parseFloat(en)||0)*(parseFloat(boy)||0)*(parseFloat(kalinlik)||0)*(parseFloat(adet)||0)/10000000; return Math.round(v*1000)/1000; }
  function calcTutkal(input, dundenKalan){
    const n = x => parseFloat(x)||0;
    const ucSabit = (n(input.alt)+n(input.ust)+n(input.sog))*7;
    const kuH = n(input.k_u)*38;
    const kkH = n(input.k_k)*18;
    const ibH = n(input.i_b)*18;
    const toplam = ucSabit+kuH+kkH+ibH;
    const harcanan = n(dundenKalan) - toplam - n(input.m_g);
    const kalan = toplam + n(input.eklenen);
    return { toplam, harcanan, kalan };
  }
  function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function sorumluAdi(id){ return state.profilesMap[id] || '—'; }

  // ---------- Auth ----------
  async function init(){
    const { data:{ session } } = await sb.auth.getSession();
    if(session){ await afterLogin(session.user); } else { state.loading=false; render(); }
  }

  function moduller(rol){
    let mods = [];
    if(rol==='satis') mods = ['satis'];
    else if(rol==='vardiya_amiri') mods = ['uretim','tedarik'];
    else if(rol==='satin_alma') mods = ['tedarik'];
    else if(rol==='mobilya_vardiya_amiri') mods = ['mobilya'];
    else if(rol==='admin' || rol==='patron') mods = ['satis','uretim','tedarik','mobilya'];
    return mods.filter(m => AKTIF_MODULLER.includes(m));
  }
  function defaultTab(modul){
    if(modul==='satis') return 'takip';
    if(modul==='tedarik') return 'kantar';
    if(modul==='mobilya') return 'mob_giyotin';
    return 'uretim_takip';
  }

  async function afterLogin(user){
    state.user = user;
    const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
    state.profile = profile;
    const mods = moduller(profile ? profile.rol : null);
    state.modul = mods[0] || null;
    state.activeTab = defaultTab(state.modul);
    await loadProfilesMap();
    await loadOrders();
    await loadHatKapasiteleri();
    if(state.activeTab==='uretim_takip') await loadGunlukUretim(true);
    if(state.activeTab==='kantar'){
      await loadKantar(true);
      await loadSoyma(true);
      await loadReceteler(true);
      await loadAyarlar(true);
      await loadGunlukUretim(true);
    }
    subscribeRealtime();
  }

  async function loadHatKapasiteleri(){
    const { data, error } = await sb.from('uretim_asamalari').select('*');
    if(!error){
      state.hatKapasiteleri = {};
      (data||[]).forEach(a => state.hatKapasiteleri[a.asama_key] = a);
    }
  }

  async function loadProfilesMap(){
    const { data } = await sb.from('profiles').select('id,ad_soyad');
    state.profilesMap = {};
    (data||[]).forEach(p => state.profilesMap[p.id] = p.ad_soyad);
  }

  function subscribeRealtime(){
    sb.channel('siparisler-rt')
      .on('postgres_changes', { event:'*', schema:'public', table:'siparisler' }, () => {
        if(state.activeTab === 'liste' && !state.modal) loadOrders(true);
      })
      .subscribe();
  }

  async function doLogin(adSoyad, password){
    state.authBusy = true; state.authError=''; render();
    const { data: eslesen, error: bulErr } = await sb.from('profiles')
      .select('giris_epostasi')
      .ilike('kullanici_adi', adSoyad.trim())
      .maybeSingle();
    if(bulErr || !eslesen || !eslesen.giris_epostasi){
      state.authBusy = false; state.authError = 'Bu isimde bir kullanıcı bulunamadı.'; render(); return;
    }
    const { data, error } = await sb.auth.signInWithPassword({ email: eslesen.giris_epostasi, password });
    state.authBusy = false;
    if(error){ state.authError = 'Giriş başarısız: kullanıcı adı veya şifre hatalı.'; render(); return; }
    await afterLogin(data.user);
    render();
  }

  async function doLogout(){
    await sb.auth.signOut();
    state = Object.assign(state, { user:null, profile:null, modul:null, orders:[], gunlukUretim:[], gunlukUretimLoaded:false, tutkal:[], tutkalLoaded:false, authError:'', authOk:'', activeTab:'liste', filterStatus:'bekliyor', search:'', modal:null });
    render();
  }

  async function doChangePassword(mevcutSifre, yeniSifre){
    const { error: dogrulamaErr } = await sb.auth.signInWithPassword({ email: state.profile.giris_epostasi, password: mevcutSifre });
    if(dogrulamaErr){ return { error: 'Mevcut şifre hatalı.' }; }
    const { error } = await sb.auth.updateUser({ password: yeniSifre });
    if(error){ return { error: 'Şifre güncellenemedi: ' + error.message }; }
    return { ok: true };
  }

  async function loadTumKullanicilar(){
    const { data, error } = await sb.from('profiles').select('id,ad_soyad,rol').order('ad_soyad');
    if(!error) state.tumKullanicilar = data || [];
  }

  async function adminSifreAta(hedefUserId, yeniSifre){
    const { data: sess } = await sb.auth.getSession();
    const token = sess && sess.session ? sess.session.access_token : null;
    if(!token) return { error: 'Oturum bulunamadı.' };
    try{
      const res = await fetch(SUPABASE_URL + '/functions/v1/admin-sifre-ata', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ hedefUserId, yeniSifre })
      });
      const json = await res.json();
      if(!res.ok) return { error: json.error || 'Şifre atanamadı.' };
      return { ok: true };
    }catch(e){
      return { error: 'Sunucuya ulaşılamadı: ' + e.message };
    }
  }

  // ---------- Data ----------
  async function loadOrders(silent){
    if(!silent){ state.loading = true; render(); }
    const { data, error } = await sb.from('siparisler').select('*').order('created_at', { ascending:false });
    if(!error) state.orders = data || [];
    state.loading = false;
    render();
  }

  async function loadGunlukUretim(silent){
    if(!silent){ state.loading = true; render(); }
    const { data, error } = await sb.from('gunluk_uretim').select('*').order('tarih', { ascending:false }).order('vardiya', { ascending:true });
    if(!error) state.gunlukUretim = data || [];
    state.gunlukUretimLoaded = true;
    state.loading = false;
    render();
  }

  async function loadTutkal(silent){
    if(!silent){ state.loading = true; render(); }
    const { data, error } = await sb.from('tutkal_takip').select('*').order('tarih', { ascending:false }).order('vardiya', { ascending:true });
    if(!error) state.tutkal = data || [];
    state.tutkalLoaded = true;
    state.loading = false;
    render();
  }

  async function loadKantar(silent){
    if(!silent){ state.loading = true; render(); }
    const { data, error } = await sb.from('kantar_girisleri').select('*').order('tarih', { ascending:false });
    if(!error) state.kantarGirisleri = data || [];
    state.kantarLoaded = true;
    state.loading = false;
    render();
  }

  async function loadSoyma(silent){
    if(!silent){ state.loading = true; render(); }
    const { data, error } = await sb.from('soyma_ciktisi').select('*').order('tarih', { ascending:false }).order('vardiya', { ascending:true });
    if(!error) state.soymaCiktisi = data || [];
    state.soymaLoaded = true;
    state.loading = false;
    render();
  }

  async function loadReceteler(silent){
    const { data, error } = await sb.from('kontraplak_receteleri').select('*');
    if(!error){
      state.kontraplakReceteleri = {};
      (data||[]).forEach(r => state.kontraplakReceteleri[r.kalinlik] = r);
    }
    state.receteLoaded = true;
    if(!silent) render();
  }

  async function loadAyarlar(silent){
    const { data, error } = await sb.from('sistem_ayarlari').select('*');
    if(!error){
      state.sistemAyarlari = {};
      (data||[]).forEach(a => state.sistemAyarlari[a.anahtar] = a.deger);
    }
    state.ayarlarLoaded = true;
    if(!silent) render();
  }

  async function loadEnvanter(silent){
    if(!silent){ state.loading = true; render(); }
    const { data, error } = await sb.from('envanter_hareketleri').select('*').order('tarih', { ascending:false });
    if(!error) state.envanterHareketleri = data || [];
    state.envanterLoaded = true;
    state.loading = false;
    render();
  }

  async function loadGiyotin(silent){

  function dosyaBoyutuMetin(bayt){
    if(bayt==null) return '—';
    if(bayt < 1024) return bayt + ' B';
    if(bayt < 1024*1024) return (bayt/1024).toFixed(1) + ' KB';
    return (bayt/(1024*1024)).toFixed(1) + ' MB';
  }

  async function cizimYukle(file, kategori, aciklama){
    state.cizimYukleniyor = true; render();
    const guvenliAd = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const yol = `${new Date().toISOString().slice(0,7)}/${crypto.randomUUID()}_${guvenliAd}`;
    const { error: uploadError } = await sb.storage.from('cizimler').upload(yol, file);
    if(uploadError){
      state.cizimYukleniyor = false;
      state.toast = {type:'err', text:'Yüklenemedi: '+uploadError.message};
      render();
      return;
    }
    const { error: dbError } = await sb.from('mobilya_cizimler').insert([{
      dosya_adi: file.name,
      kategori: kategori || null,
      aciklama: aciklama || null,
      dosya_yolu: yol,
      dosya_boyutu: file.size,
      created_by: state.user.id
    }]);
    state.cizimYukleniyor = false;
    if(dbError){
      state.toast = {type:'err', text:'Kaydedilemedi: '+dbError.message};
    }else{
      state.toast = {type:'ok', text:'Çizim yüklendi: '+file.name};
      state.modal = null;
    }
    await loadCizimler(true);
  }

  async function cizimIndir(dosyaYolu, dosyaAdi){
    const { data, error } = await sb.storage.from('cizimler').createSignedUrl(dosyaYolu, 60);
    if(error){
      state.toast = {type:'err', text:'İndirilemedi: '+error.message};
      render();
      return;
    }
    const a = document.createElement('a');
    a.href = data.signedUrl;
    a.download = dosyaAdi;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  async function cizimSil(id, dosyaYolu){
    const { error: storageError } = await sb.storage.from('cizimler').remove([dosyaYolu]);
    const { error: dbError } = await sb.from('mobilya_cizimler').delete().eq('id', id);
    state.toast = (storageError || dbError) ? {type:'err', text:'Silinemedi: '+((dbError||storageError).message)} : {type:'ok', text:'Çizim silindi.'};
    await loadCizimler(true);
  }

  function disPapelStokHesapla(){
    const gruplar = {};
    state.disPapelHareketleri.forEach(r=>{
      const key = r.olcu_tur;
      if(!gruplar[key]) gruplar[key] = { olcu_tur:r.olcu_tur, giris:0, cikis:0 };
      if(r.hareket_tipi==='giris') gruplar[key].giris += Number(r.miktar||0);
      else gruplar[key].cikis += Number(r.miktar||0);
    });
    return Object.values(gruplar).map(g => Object.assign({}, g, { stok: Math.round((g.giris-g.cikis)*1000)/1000 }));
  }

  function envanterStokHesapla(kategori){
    const kayitlar = state.envanterHareketleri.filter(r => !kategori || r.kategori===kategori);
    const gruplar = {};
    kayitlar.forEach(r=>{
      const key = r.kategori + '|' + r.urun_adi;
      if(!gruplar[key]) gruplar[key] = { kategori:r.kategori, urun_adi:r.urun_adi, giris:0, cikis:0 };
      if(r.hareket_tipi==='giris') gruplar[key].giris += Number(r.miktar||0);
      else gruplar[key].cikis += Number(r.miktar||0);
    });
    return Object.values(gruplar).map(g => Object.assign({}, g, { stok: Math.round((g.giris - g.cikis)*1000)/1000 }));
  }

  function ayar(anahtar, varsayilan){

    return (v==null) ? varsayilan : v;

  function sortedFilteredOrders(){
    let list = state.orders.slice().sort((a,b)=> new Date(a.created_at) - new Date(b.created_at));
    list = list.map((o,i)=> Object.assign({}, o, {no:i+1}));
    if(state.filterStatus !== 'tumu') list = list.filter(o=>o.status===state.filterStatus);
    if(state.search.trim()){
      const q = state.search.trim().toLocaleLowerCase('tr-TR');
      list = list.filter(o => sorumluAdi(o.sorumlu_id).toLocaleLowerCase('tr-TR').includes(q) || (o.cins||'').toLocaleLowerCase('tr-TR').includes(q));
    }
    return list.slice().sort((a,b)=> new Date(b.created_at) - new Date(a.created_at));
  }

  function rowHtml(o,rol){
    const editedBadge = o.updated_at && o.updated_at !== o.created_at ? `<div class="hint" style="margin-top:2px;">düzenlendi: ${fmtDate(o.updated_at)}</div>` : '';
    const silBtn = rol==='admin' ? ` <button class="row-btn ghost" data-action="siparis-sil" data-id="${o.id}">Sil</button>` : '';
    let actionBtn = '';
    if(o.status==='bekliyor'){
      if(rol==='patron'){ actionBtn = ''; }
      else if(rol==='admin'){
        actionBtn = `<button class="row-btn" data-action="edit" data-id="${o.id}">Düzenle</button> <button class="row-btn primary" data-action="mark" data-id="${o.id}">Üretildi işaretle</button>${silBtn}`;
      }
      else if(rol==='satis' && o.sorumlu_id===state.user.id){ actionBtn = `<button class="row-btn" data-action="edit" data-id="${o.id}">Düzenle</button>`; }
      else if(canEdit(rol)){ actionBtn = `<button class="row-btn primary" data-action="mark" data-id="${o.id}">Üretildi işaretle</button>`; }
    }else{
      actionBtn = `<button class="row-btn ghost" data-action="detail" data-id="${o.id}">Detay</button>${silBtn}`;
    }
    let stageCell = '—';
    if(o.status==='bekliyor'){
      if(canEdit(rol)){
        stageCell = `<select data-action="update-stage" data-id="${o.id}" style="padding:5px 8px;border:1px solid var(--line);border-radius:6px;font-size:12px;background:#fff;">
          ${ASAMA_OPTIONS.map(a=>`<option value="${a}" ${o.asama===a?'selected':''}>${a}</option>`).join('')}
        </select>`;
      }else{ stageCell = escapeHtml(o.asama || '—'); }
    }
    return `<tr>
      <td class="mono">${o.no}</td>
      <td>${fmtDate(o.siparis_tarihi)}${editedBadge}</td>
      <td>${fmtDate(o.termin_tarihi)}</td>
      <td>${escapeHtml(o.cins)}</td>
      <td class="mono">${o.en}×${o.boy}×${o.kalinlik}</td>
      <td class="mono">${o.adet}</td>
      <td class="mono">${(o.m3||0).toFixed(3)}</td>
      <td>${escapeHtml(sorumluAdi(o.sorumlu_id))}</td>
      <td>${stageCell}</td>
      <td><span class="status-pill ${o.status}"><span class="dot"></span>${o.status==='bekliyor'?'Bekliyor':'Üretildi'}</span></td>
      <td>${actionBtn}</td>
    </tr>`;
  }

  function kapasiteMetni(key, rol){
    const a = state.hatKapasiteleri[key];
    if(!a) return '';
    const birim = canEdit(rol) ? 'ikisi' : (a.gorunur_birim||'ikisi');
    const parts = [];
    if((birim==='m3'||birim==='ikisi') && a.kapasite_m3!=null) parts.push(a.kapasite_m3+' m³/gün');
    if((birim==='adet'||birim==='ikisi') && a.kapasite_adet!=null) parts.push(a.kapasite_adet+' adet/gün');
    return parts.join(' · ');
  }

  // ---------- Üretim Takip ----------
  function ayAdi(ym){
    const aylar = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    const [y,m] = ym.split('-');
    return aylar[parseInt(m,10)-1] + ' ' + y;
  }

  function gunlukUretimFiltreli(){
    let kayitlar = state.gunlukUretim.slice();
    if(state.gunlukBaslangic) kayitlar = kayitlar.filter(r => r.tarih >= state.gunlukBaslangic);
    if(state.gunlukBitis) kayitlar = kayitlar.filter(r => r.tarih <= state.gunlukBitis);
    return kayitlar.sort((a,b)=> (b.tarih+b.vardiya).localeCompare(a.tarih+a.vardiya));
  }

  function vardiyaRenk(vNo){
    return { 1:'#FFF3E0', 2:'#E8F1FF', 3:'#F3EAFF' }[vNo] || '#F5F5F5';
  }

  function hesaplaOzet(ay){
    const kayitlar = state.gunlukUretim.filter(r => r.tarih && r.tarih.slice(0,7)===ay);
    const toplamAdet = kayitlar.reduce((s,r)=>s+(r.adet||0),0);
    const toplamM3 = kayitlar.reduce((s,r)=>s+(r.m3||0),0);
    const fireAdet = kayitlar.reduce((s,r)=>s+(r.fire_adet||0),0);
    const fireM3 = kayitlar.reduce((s,r)=>s+(r.fire_m3||0),0);
    const gunler = new Set(kayitlar.map(r=>r.tarih));
    const grupla = (keyFn) => {
      const m = {};
      kayitlar.forEach(r => { const k = keyFn(r) || '—'; m[k] = (m[k]||0) + (r.m3||0); });
      return m;
    };
    const kalinlikBazli = {};
    kayitlar.forEach(r => {
      const k = (r.kalinlik!=null ? r.kalinlik+' mm' : '—');
      if(!kalinlikBazli[k]) kalinlikBazli[k] = { adet:0, m3:0 };
      kalinlikBazli[k].adet += (r.adet||0);
      kalinlikBazli[k].m3 += (r.m3||0);
    });
    return {
      kayitSayisi: kayitlar.length,
      uretimGunu: gunler.size,
      toplamAdet, toplamM3, fireAdet, fireM3,
      firePct: toplamM3 ? (fireM3/toplamM3*100) : 0,
      ortGunM3: gunler.size ? (toplamM3/gunler.size) : 0,
      makineBazli: grupla(r=>r.makine),
      cinsBazli: grupla(r=>r.cins),
      vardiyaBazli: grupla(r=>'Vardiya '+r.vardiya),
      ustaBazli: grupla(r=>r.usta),
      kalinlikBazli
    };
  }

  function renderKirilimTablosu(baslik, obj){
    const girdiler = Object.entries(obj).sort((a,b)=>b[1]-a[1]);
    if(girdiler.length===0) return '';
    return `<div class="card" style="padding:16px;">
      <h3 style="font-size:14px;margin-bottom:10px;">${escapeHtml(baslik)}</h3>
      ${girdiler.map(([k,v])=>`<div class="meta-row"><span>${escapeHtml(k)}</span><b>${v.toFixed(3)} m³</b></div>`).join('')}
    </div>`;
  }

  function renderUretimTakipTab(rol){
    const istenenView = state.uretimTakipView || 'gunluk';
    const gorunumler = URETIM_TAKIP_ALT_GORUNUMLER.filter(v => !v.adminOnly || rol==='admin');
    const view = gorunumler.find(v=>v.key===istenenView) ? istenenView : 'gunluk';
    const kayitlar = gunlukUretimFiltreli();
    const ay = state.ozetAy;
    const ozet = hesaplaOzet(ay);

    const cipBar = `<div class="filters">
        ${gorunumler.map(v=>`<div class="chip ${view===v.key?'active':''}" data-action="ut-view" data-view="${v.key}">${v.label}</div>`).join('')}
        ${view==='gunluk' ? `
          <input type="date" value="${state.gunlukBaslangic}" data-action="gunluk-tarih-baslangic" title="Başlangıç tarihi" style="padding:6px 10px;border:1px solid var(--line);border-radius:6px;font-size:12px;">
          <span class="hint">—</span>
          <input type="date" value="${state.gunlukBitis}" data-action="gunluk-tarih-bitis" title="Bitiş tarihi" style="padding:6px 10px;border:1px solid var(--line);border-radius:6px;font-size:12px;">
          ${(state.gunlukBaslangic || state.gunlukBitis) ? `<button class="row-btn" data-action="gunluk-tarih-temizle">Temizle</button>` : ''}
        ` : ''}
        ${view==='gunluk' ? `<button class="row-btn" data-action="excel-export" data-export="gunluk_uretim" style="margin-left:auto;">Excel'e Aktar</button>` : ''}
        ${view==='gunluk' && canEdit(rol) ? `<button class="row-btn primary" data-action="uretim-ekle">+ Yeni Kayıt</button>` : ''}
        ${view==='ozet' ? `<button class="row-btn" data-action="excel-export" data-export="aylik_ozet" style="margin-left:auto;">Excel'e Aktar</button>` : ''}
      </div>`;

    let icerik;
    if(view==='gunluk') icerik = renderGunlukKayitlar(kayitlar, rol);
    else if(view==='ozet') icerik = renderAylikOzet(ay, ozet);
    else if(view==='tutkal') icerik = renderTutkalTab(rol);
    else if(view==='kapasite') icerik = renderHatTab(rol);
    else if(view==='torna') icerik = renderSoymaCiktisiTab(rol);
    else if(view==='receteler') icerik = renderReceteTab(rol);
    else icerik = '';

    return cipBar + icerik;
  }

  function renderGunlukKayitlar(kayitlar, rol){
    if(kayitlar.length===0) return `<div class="card"><div class="empty"><b>Kayıt yok</b>${(state.gunlukBaslangic||state.gunlukBitis) ? 'Seçilen tarih aralığında kayıt bulunamadı.' : 'Henüz üretim kaydı girilmemiş.'}</div></div>`;

    // Tarihe göre grupla (kayitlar zaten tarih+vardiya azalan sırada)
    const gunler = {};
    const gunSirasi = [];
    kayitlar.forEach(r => {
      if(!gunler[r.tarih]){ gunler[r.tarih] = {}; gunSirasi.push(r.tarih); }
      if(!gunler[r.tarih][r.vardiya]) gunler[r.tarih][r.vardiya] = [];
      gunler[r.tarih][r.vardiya].push(r);
    });

    return gunSirasi.map(tarih => {
      const vardiyalar = gunler[tarih];
      const vardiyaNolar = Object.keys(vardiyalar).map(Number).sort((a,b)=>a-b);
      let gunAdet = 0, gunM3 = 0, gunFireM3 = 0;

      const vardiyaBloklari = vardiyaNolar.map(vNo => {
        const satirlar = vardiyalar[vNo];
        const vAdet = satirlar.reduce((s,r)=>s+(r.adet||0),0);
        const vM3 = satirlar.reduce((s,r)=>s+(r.m3||0),0);
        const vFireM3 = satirlar.reduce((s,r)=>s+(r.fire_m3||0),0);
        gunAdet += vAdet; gunM3 += vM3; gunFireM3 += vFireM3;
        const usta = satirlar.find(r=>r.makine==='Ç-K-P' && r.usta)?.usta || satirlar.find(r=>r.usta)?.usta;
        return `
          <tr style="background:${vardiyaRenk(vNo)};border-top:2px solid var(--amber-dark);"><td colspan="9" style="font-weight:800;font-size:13px;padding:9px 12px;color:#3a3126;"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--amber-dark);margin-right:8px;vertical-align:middle;"></span>Vardiya ${vNo}${usta?' · '+escapeHtml(usta):''}</td></tr>
          ${satirlar.map(r=>`<tr style="background:${vardiyaRenk(vNo)};">
            <td></td>
            <td>${escapeHtml(r.makine)}</td>
            <td>${escapeHtml(r.cins)}</td>
            <td class="mono">${r.boy||'—'}×${r.en||'—'}×${r.kalinlik||'—'}</td>
            <td class="mono">${r.adet}</td>
            <td class="mono">${r.fire_adet||0}</td>
            <td class="mono">${(r.fire_m3||0).toFixed(3)}</td>
            <td class="mono">${(r.m3||0).toFixed(3)}</td>
            <td>${canEdit(rol) ? `<button class="row-btn" data-action="uretim-duzenle" data-id="${r.id}">Düzenle</button>${rol==='admin'?` <button class="row-btn ghost" data-action="uretim-sil" data-id="${r.id}">Sil</button>`:''}` : ''}</td>
          </tr>`).join('')}

      aySonuKalan: kayitlar.length ? kayitlar[kayitlar.length-1].kalan : null,

  // ---------- Tedarik Zinciri: Kantar / Tomruk Sahası / Torna / Üretim Planlama ----------

  function bilinenTomrukKategorileri(){
    return Array.from(new Set(state.kantarGirisleri.map(k=>k.olcu_kategori).filter(Boolean)));
  }

  function gunSayisi(kayitlar, gunAlani){
    const gunler = new Set(kayitlar.map(r=>r[gunAlani]));
    return gunler.size || 1;
  }

  function tomrukHedefineGoreIhtiyacHesapla(){
    const hedefM3 = ayar('hedef_gunluk_kontraplak_m3', 30);
    const verimYuzde = ayar('soyma_verimi_yuzde', 55);
    const kavakYogunluk = ayar('kavak_yogunluk_kg_m3', 730);
    // Kontraplak, papel katmanlarının üst üste preslenmesiyle oluşur; hacimce yaklaşık 1:1 kabul edilir.
    const papelGerekliGunluk = hedefM3;
    const tomrukGerekliGunluk = papelGerekliGunluk / (verimYuzde/100);
    const m3TonaCevir = m3 => m3 * kavakYogunluk / 1000;
    return {
      hedefM3,
      verimYuzde,
      papelGerekliGunluk,
      tomrukGerekliGunluk,
      tomrukGerekliHaftalik: tomrukGerekliGunluk*7,
      tomrukGerekliAylik: tomrukGerekliGunluk*30,
      tomrukGerekliGunlukTon: m3TonaCevir(tomrukGerekliGunluk),
      tomrukGerekliHaftalikTon: m3TonaCevir(tomrukGerekliGunluk*7),
      tomrukGerekliAylikTon: m3TonaCevir(tomrukGerekliGunluk*30)
    };
  }

  function tomrukSahasiHesapla(){
    const verimYuzde = ayar('soyma_verimi_yuzde', 55);
    const kategoriler = bilinenTomrukKategorileri();
    const sonuc = {};
    const otuzGunOnce = new Date(); otuzGunOnce.setDate(otuzGunOnce.getDate()-30);
    const otuzGunOnceStr = otuzGunOnce.toISOString().slice(0,10);

    kategoriler.forEach(kat => {
      const gelenler = state.kantarGirisleri.filter(k=>k.olcu_kategori===kat);
      const gelenM3 = gelenler.reduce((s,k)=>s+(k.m3||0),0);
      const soymalar = state.soymaCiktisi.filter(s=>s.tomruk_kategori===kat);
      const tuketilenM3 = soymalar.reduce((s,r)=> s + ((r.m3||0) / (verimYuzde/100)), 0);
      const kalanM3 = gelenM3 - tuketilenM3;
      const sonDonemSoyma = soymalar.filter(r=>r.tarih >= otuzGunOnceStr);
      const sonDonemTuketim = sonDonemSoyma.reduce((s,r)=> s + ((r.m3||0)/(verimYuzde/100)), 0);
      const gunler = gunSayisi(sonDonemSoyma, 'tarih');
      const gunlukOrt = sonDonemSoyma.length ? sonDonemTuketim/gunler : 0;
      sonuc[kat] = { gelenM3, tuketilenM3, kalanM3, gunlukOrt, kacGun: gunlukOrt>0 ? kalanM3/gunlukOrt : null };
    });
    return sonuc;
  }

  function receteKatSayilari(kalinlik){
    const r = state.kontraplakReceteleri[kalinlik];
    if(!r) return null;
    const sayim = {};
    (r.dizilim||[]).forEach(k => { sayim[k] = (sayim[k]||0)+1; });
    return sayim;
  }

  function papelUretilenHesapla(){
    const sonuc = { '1.2': 0, '2.1': 0 };
    state.soymaCiktisi.forEach(r => { sonuc[String(r.kalinlik)] = (sonuc[String(r.kalinlik)]||0) + (r.m3||0); });
    return sonuc;
  }

  function papelTuketilenHesapla(kayitlar){
    const sonuc = { '1.2': 0, '2.1': 0 };
    (kayitlar||state.gunlukUretim).forEach(r => {
      const sayim = receteKatSayilari(r.kalinlik);
      if(!sayim) return;
      const panelM2 = (parseFloat(r.en)||0)*(parseFloat(r.boy)||0)/10000; // cm -> m2
      Object.entries(sayim).forEach(([kThickness, adetKat]) => {
        const layerM3 = panelM2 * (parseFloat(kThickness)/1000) * (r.adet||0) * adetKat;
        if(sonuc[kThickness]!=null) sonuc[kThickness] += layerM3;
      });
    });
    return sonuc;
  }

  function papelStokuHesapla(){
    const uretilen = papelUretilenHesapla();
    const tuketilen = papelTuketilenHesapla();
    return {
      '1.2': { uretilen: uretilen['1.2'], tuketilen: tuketilen['1.2'], kalan: uretilen['1.2']-tuketilen['1.2'] },
      '2.1': { uretilen: uretilen['2.1'], tuketilen: tuketilen['2.1'], kalan: uretilen['2.1']-tuketilen['2.1'] }
    };
  }

  function papelIhtiyacHesapla(){
    const bekleyenler = state.orders.filter(o=>o.status==='bekliyor');
    const eksikRecete = new Set();
    const ihtiyac = { '1.2': 0, '2.1': 0 };
    bekleyenler.forEach(o => {
      const sayim = receteKatSayilari(o.kalinlik);
      if(!sayim){ eksikRecete.add(o.kalinlik); return; }
      const panelM2 = (parseFloat(o.en)||0)*(parseFloat(o.boy)||0)/10000;
      Object.entries(sayim).forEach(([kThickness, adetKat]) => {
        const layerM3 = panelM2 * (parseFloat(kThickness)/1000) * (o.adet||0) * adetKat;
        if(ihtiyac[kThickness]!=null) ihtiyac[kThickness] += layerM3;
      });
    });
    return { ihtiyac, eksikRecete: Array.from(eksikRecete) };
  }

  function uretimPlanlamaHesapla(){
    const stok = papelStokuHesapla();
    const otuzGunOnce = new Date(); otuzGunOnce.setDate(otuzGunOnce.getDate()-30);
    const otuzGunOnceStr = otuzGunOnce.toISOString().slice(0,10);
    const sonDonemUretim = state.gunlukUretim.filter(r=>r.tarih>=otuzGunOnceStr);
    const gunlukTuketim = papelTuketilenHesapla(sonDonemUretim);
    const gunSayi = gunSayisi(sonDonemUretim,'tarih');
    const { ihtiyac, eksikRecete } = papelIhtiyacHesapla();

    const kacGun = {};
    ['1.2','2.1'].forEach(k => {
      const ortalama = sonDonemUretim.length ? gunlukTuketim[k]/gunSayi : 0;
      kacGun[k] = ortalama>0 ? stok[k].kalan/ortalama : null;
    });

    let oneri = null;
    if(kacGun['1.2']!=null && kacGun['2.1']!=null){
      oneri = kacGun['1.2'] < kacGun['2.1'] ? '1.2' : '2.1';
    }else if(kacGun['1.2']!=null){ oneri = '1.2'; }
    else if(kacGun['2.1']!=null){ oneri = '2.1'; }

    return { stok, ihtiyac, eksikRecete, kacGun, oneri };
  }

  // ---------- Events ----------
  app.addEventListener('click', function(e){
    const t = e.target.closest('[data-action]');
    if(!t){ if(e.target.classList.contains('overlay')){ state.modal=null; render(); } return; }
    const action = t.dataset.action;
    if(action==='logout'){ doLogout(); }
    else if(action==='sifre-degistir'){ state.modal = { type:'sifre-degistir' }; render(); }
    else if(action==='kullanicilar'){ loadTumKullanicilar().then(render); state.modal = { type:'kullanicilar' }; render(); }
    else if(action==='sifre-ata-ac'){ state.modal = { type:'sifre-ata', hedefId: t.dataset.id, hedefAd: t.dataset.ad }; render(); }
    else if(action==='modul'){
      state.modul = t.dataset.modul; state.activeTab = defaultTab(state.modul); state.toast=null;
      if(state.activeTab==='uretim_takip' && !state.gunlukUretimLoaded){ loadGunlukUretim(); }
      if(state.modul==='tedarik'){
        if(!state.kantarLoaded) loadKantar(true);
        if(!state.soymaLoaded) loadSoyma(true);
        if(!state.receteLoaded) loadReceteler(true);
        if(!state.ayarlarLoaded) loadAyarlar(true);
        if(!state.gunlukUretimLoaded) loadGunlukUretim(true);
        if(!state.tutkalLoaded) loadTutkal(true);
        if(!state.envanterLoaded) loadEnvanter(true);
      }
      if(state.modul==='mobilya'){
        if(!state.giyotinLoaded) loadGiyotin(true);
        if(!state.disPapelLoaded) loadDisPapel(true);
        if(!state.presLoaded) loadPres(true);
        if(!state.cncLoaded) loadCnc(true);
        if(!state.zimparaLoaded) loadZimparaFitil(true);
        if(!state.cizimlerLoaded) loadCizimler(true);
      }
      render();
    }
    else if(action==='refresh'){ loadOrders(); }
    else if(action==='tab'){
      state.activeTab = t.dataset.tab; state.toast=null;
      if(state.activeTab==='uretim_takip' && !state.gunlukUretimLoaded){ loadGunlukUretim(); }
      if(state.activeTab==='kalan_tutkal' && !state.tutkalLoaded){ loadTutkal(true); }
      if(state.activeTab==='envanter' && !state.envanterLoaded){ loadEnvanter(true); }
      if(['mob_giyotin','mob_dis_papel','mob_pres','mob_cnc','mob_zimpara_fitil','mob_kapasite','mob_cizimler'].includes(state.activeTab)){
        if(!state.giyotinLoaded) loadGiyotin(true);
        if(!state.disPapelLoaded) loadDisPapel(true);
        if(!state.presLoaded) loadPres(true);
        if(!state.cncLoaded) loadCnc(true);
        if(!state.zimparaLoaded) loadZimparaFitil(true);
        if(!state.cizimlerLoaded) loadCizimler(true);
      }
      if(['kantar','tomruk_sahasi','uretim_planlama'].includes(state.activeTab)){
        if(!state.kantarLoaded) loadKantar(true);
        if(!state.soymaLoaded) loadSoyma(true);
        if(!state.receteLoaded) loadReceteler(true);
        if(!state.ayarlarLoaded) loadAyarlar(true);
        if(!state.gunlukUretimLoaded) loadGunlukUretim(true);
      }
      render();
    }
    else if(action==='filter'){ state.filterStatus = t.dataset.status; render(); }
    else if(action==='edit'){ const o = state.orders.find(x=>x.id===t.dataset.id); state.modal={type:'edit', order:o}; render(); }
    else if(action==='mark'){ const o = state.orders.find(x=>x.id===t.dataset.id); state.modal={type:'mark', order:o}; render(); }
    else if(action==='detail'){ const o = state.orders.find(x=>x.id===t.dataset.id); const list = sortedFilteredOrders(); const withNo = list.find(x=>x.id===o.id); state.modal={type:'detail', order:Object.assign({},o,{no:withNo?withNo.no:''})}; render(); }
    else if(action==='open-asama'){ state.modal = { type:'kapasite', key: t.dataset.key }; render(); }
    else if(action==='ut-view'){
      state.uretimTakipView = t.dataset.view; state.toast=null;
      if(state.uretimTakipView==='tutkal'){
        if(!state.tutkalLoaded) loadTutkal(true);
        if(!state.gunlukUretimLoaded) loadGunlukUretim(true);
      }
      if(['torna','receteler'].includes(state.uretimTakipView)){
        if(!state.soymaLoaded) loadSoyma(true);
        if(!state.receteLoaded) loadReceteler(true);
        if(!state.ayarlarLoaded) loadAyarlar(true);
      }
      render();
    }
    else if(action==='tk-view'){ state.tutkalView = t.dataset.view; render(); }
    else if(action==='uretim-ekle'){ state.modal = { type:'uretim-kaydi', kayit:null }; render(); }
    else if(action==='uretim-duzenle'){ const r = state.gunlukUretim.find(x=>x.id===t.dataset.id); state.modal = { type:'uretim-kaydi', kayit:r }; render(); }
    else if(action==='tutkal-ekle'){ state.modal = { type:'tutkal-kaydi', kayit:null }; render(); }
    else if(action==='tutkal-duzenle'){ const r = state.tutkal.find(x=>x.id===t.dataset.id); state.modal = { type:'tutkal-kaydi', kayit:r }; render(); }
    else if(action==='siparis-sil'){
      if(confirm('Bu siparişi kalıcı olarak silmek istediğine emin misin?')){
        sb.from('siparisler').delete().eq('id', t.dataset.id).then(({error})=>{
          state.toast = error ? {type:'err', text:'Silinemedi: '+error.message} : {type:'ok', text:'Sipariş silindi.'};
          loadOrders(true);
        });
      }
    }
    else if(action==='uretim-sil'){
      if(confirm('Bu üretim kaydını kalıcı olarak silmek istediğine emin misin?')){
        sb.from('gunluk_uretim').delete().eq('id', t.dataset.id).then(({error})=>{
          state.toast = error ? {type:'err', text:'Silinemedi: '+error.message} : {type:'ok', text:'Üretim kaydı silindi.'};
          loadGunlukUretim(true);
        });
      }
    }
    else if(action==='tutkal-sil'){
      if(confirm('Bu tutkal kaydını kalıcı olarak silmek istediğine emin misin?')){
        sb.from('tutkal_takip').delete().eq('id', t.dataset.id).then(({error})=>{
          state.toast = error ? {type:'err', text:'Silinemedi: '+error.message} : {type:'ok', text:'Tutkal kaydı silindi.'};
          loadTutkal(true);
        });
      }
    }
    else if(action==='kantar-ekle'){ state.modal = { type:'kantar-kaydi', kayit:null }; render(); }
    else if(action==='kantar-duzenle'){ const r = state.kantarGirisleri.find(x=>x.id===t.dataset.id); state.modal = { type:'kantar-kaydi', kayit:r }; render(); }
    else if(action==='kantar-sil'){
      if(confirm('Bu kantar kaydını kalıcı olarak silmek istediğine emin misin?')){
        sb.from('kantar_girisleri').delete().eq('id', t.dataset.id).then(({error})=>{
          state.toast = error ? {type:'err', text:'Silinemedi: '+error.message} : {type:'ok', text:'Kantar kaydı silindi.'};
          loadKantar(true);
        });
      }
    }
    else if(action==='soyma-ekle'){ state.modal = { type:'soyma-kaydi', kayit:null }; render(); }
    else if(action==='soyma-duzenle'){ const r = state.soymaCiktisi.find(x=>x.id===t.dataset.id); state.modal = { type:'soyma-kaydi', kayit:r }; render(); }
    else if(action==='soyma-sil'){
      if(confirm('Bu torna kaydını kalıcı olarak silmek istediğine emin misin?')){

        vardiya: parseInt(f.vardiya.value,10),
        olcu: f.olcu.value.trim() || null,
        adet: parseInt(f.adet.value,10),
        aciklama: f.aciklama.value.trim() || null
      };
      let error;
      if(state.modal.kayit){
        ({ error } = await sb.from('mobilya_cnc_islem').update(data).eq('id', state.modal.kayit.id));
      }else{
        ({ error } = await sb.from('mobilya_cnc_islem').insert([Object.assign({}, data, { created_by: state.user.id })]));
      }
      state.toast = error ? {type:'err', text:'Kaydedilemedi: '+error.message} : {type:'ok', text:'CNC kaydı kaydedildi.'};
      state.modal = null;
      await loadCnc(true);
    }

    else if(e.target.id==='zimpara-kaydi-form'){
      const f = e.target;
      const data = {
        tarih: f.tarih.value,
        vardiya: parseInt(f.vardiya.value,10),
        bolum: f.bolum.value,
        adet: parseInt(f.adet.value,10),
        cikis_yeri: f.cikis_yeri.value,
        aciklama: f.aciklama.value.trim() || null
      };
      let error;
      if(state.modal.kayit){
        ({ error } = await sb.from('mobilya_zimpara_fitil').update(data).eq('id', state.modal.kayit.id));
      }else{
        ({ error } = await sb.from('mobilya_zimpara_fitil').insert([Object.assign({}, data, { created_by: state.user.id })]));
      }
      state.toast = error ? {type:'err', text:'Kaydedilemedi: '+error.message} : {type:'ok', text:'Zımpara/fitil kaydı kaydedildi.'};
      state.modal = null;
      await loadZimparaFitil(true);
    }

    else if(e.target.id==='envanter-hareket-form'){
      const f = e.target;
      const data = {
        tarih: f.tarih.value,
        kategori: f.kategori.value,
        urun_adi: f.urun_adi.value.trim(),
        miktar: parseFloat(f.miktar.value),
        hareket_tipi: f.dataset.hareketTipi,
        aciklama: f.aciklama.value.trim() || null
      };
      let error;
      if(state.modal.kayit){
        ({ error } = await sb.from('envanter_hareketleri').update(data).eq('id', state.modal.kayit.id));
      }else{
        ({ error } = await sb.from('envanter_hareketleri').insert([Object.assign({}, data, { created_by: state.user.id })]));
      }
      state.toast = error ? {type:'err', text:'Kaydedilemedi: '+error.message} : {type:'ok', text:'Envanter hareketi kaydedildi.'};
      state.modal = null;
      await loadEnvanter(true);
    }

    else if(e.target.id==='kantar-kaydi-form'){
      const f = e.target;
      const kilo = parseFloat(f.kilo.value);
      const data = {
        tarih: f.tarih.value,
        kilo,
        m3: Math.round((kilo/ayar('kavak_yogunluk_kg_m3',730))*1000)/1000,
        tedarikci: f.tedarikci.value.trim() || null,
        plaka: f.plaka.value.trim() || null,
        olcu_kategori: f.olcu_kategori.value.trim()
      };
      let error;
      if(state.modal.kayit){
        ({ error } = await sb.from('kantar_girisleri').update(data).eq('id', state.modal.kayit.id));
      }else{
        ({ error } = await sb.from('kantar_girisleri').insert([Object.assign({}, data, { created_by: state.user.id })]));
      }
      state.toast = error ? {type:'err', text:'Kaydedilemedi: '+error.message} : {type:'ok', text:'Kantar kaydı kaydedildi.'};
      state.modal = null;
      await loadKantar(true);
    }

    else if(e.target.id==='soyma-kaydi-form'){
      const f = e.target;
      const palet = parseFloat(f.palet_sayisi.value);
      const adetPalet = parseFloat(f.adet_palet.value);
      const en = parseFloat(f.en.value);
      const boy = parseFloat(f.boy.value);
      const kalinlik = parseFloat(f.kalinlik.value);
      const toplamAdet = palet*adetPalet;
      const data = {
        tarih: f.tarih.value,
        vardiya: parseInt(f.vardiya.value,10),
        kalinlik, palet_sayisi: palet, adet_palet: adetPalet, en, boy,
        m3: Math.round(((en*boy*kalinlik*toplamAdet)/10000000)*1000)/1000,
        tomruk_kategori: f.tomruk_kategori.value.trim()
      };
      let error;
      if(state.modal.kayit){
        ({ error } = await sb.from('soyma_ciktisi').update(Object.assign({}, data, { updated_at:new Date().toISOString() })).eq('id', state.modal.kayit.id));
      }else{
        ({ error } = await sb.from('soyma_ciktisi').insert([Object.assign({}, data, { created_by: state.user.id })]));
      }
      state.toast = error ? {type:'err', text:'Kaydedilemedi: '+error.message} : {type:'ok', text:'Torna kaydı kaydedildi.'};
      state.modal = null;
      await loadSoyma(true);
    }

    else if(e.target.id==='recete-kaydi-form'){
      const f = e.target;
      const kalinlik = parseFloat(f.kalinlik.value);
      const dizilim = f.dizilim.value.split(',').map(s=>parseFloat(s.trim())).filter(n=>!isNaN(n));
      const { error } = await sb.from('kontraplak_receteleri').upsert({
        kalinlik, kat_sayisi: dizilim.length, dizilim,
        updated_at: new Date().toISOString(), updated_by: state.user.id
      }, { onConflict: 'kalinlik' });
      state.toast = error ? {type:'err', text:'Kaydedilemedi: '+error.message} : {type:'ok', text:'Reçete kaydedildi.'};
      state.modal = null;
      await loadReceteler(true);
      render();
    }

    else if(e.target.id==='ayarlar-form'){
      const f = e.target;
      const guncellemeler = [
        { anahtar:'kavak_yogunluk_kg_m3', deger: parseFloat(f.kavak_yogunluk_kg_m3.value) },
        { anahtar:'soyma_verimi_yuzde', deger: parseFloat(f.soyma_verimi_yuzde.value) },
        { anahtar:'hedef_gunluk_kontraplak_m3', deger: parseFloat(f.hedef_gunluk_kontraplak_m3.value) }
      ];
      let hata = null;
      for(const g of guncellemeler){
        const { error } = await sb.from('sistem_ayarlari').update({ deger: g.deger, updated_at:new Date().toISOString(), updated_by: state.user.id }).eq('anahtar', g.anahtar);
        if(error) hata = error;
      }
      state.toast = hata ? {type:'err', text:'Kaydedilemedi: '+hata.message} : {type:'ok', text:'Ayarlar güncellendi.'};
      state.modal = null;
      await loadAyarlar(true);
      render();
    }
  });

  document.title = "Akış";
  init();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* sessiz geç, PWA çalışmaya devam eder */ });
  });
}

</script>
</body>
</html>
